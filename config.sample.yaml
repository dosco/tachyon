# tachyon sample config — copy to config.yaml and edit.
#
# TLS is configured via flags, not this file:
#
#   ./tachyon -config config.yaml \
#             -tls-listen :8443   \
#             -tls-cert   /etc/tls/cert.pem \
#             -tls-key    /etc/tls/key.pem
#
# Omit -tls-cert / -tls-key and tachyon generates a self-signed cert on
# startup (useful for local dev). The plaintext listener below stays active
# alongside the TLS one.

# Address for the plaintext listener.
listen: ":8080"

# ---------------------------------------------------------------------------
# Upstreams — named pools of backend addresses.
# ---------------------------------------------------------------------------

upstreams:
  # Minimal: single backend, everything at defaults.
  api:
    addrs: ["127.0.0.1:9000"]

  # Full example: multiple backends with load balancing, health checks,
  # outlier detection, and retry budgets.
  backend:
    addrs:
      - "10.0.0.1:9000"
      - "10.0.0.2:9000"
      - "10.0.0.3:9000"

    # How many idle upstream connections to keep warm per worker process.
    # Default: 256. Raise if you see connection setup latency under burst.
    idle_per_host: 256

    # Dial timeout for new upstream connections. Default: 1s.
    connect_timeout: "1s"

    # Load-balancing policy across the addresses in this pool.
    # "rr"        — round-robin (default).
    # "p2c_ewma"  — power-of-two-choices: pick two addresses at random,
    #               route to the one with the lower latency EWMA.
    #               Best when your backends have different response times.
    lb_policy: "p2c_ewma"

    # Passive outlier ejection. An address is pulled from rotation when it
    # accumulates too many consecutive errors and re-added automatically
    # once it recovers. Omit this block to disable (zero overhead).
    outlier_detection:
      consecutive_5xx: 5            # streak of 5xx responses
      consecutive_gateway_errors: 5 # streak of connection/IO failures
      ejection_duration: "30s"      # how long to keep it out
      max_ejected_percent: 50       # never eject more than half the pool

    # Active health probes. tachyon issues an HTTP HEAD to each address
    # at the given interval. Addresses that fail (5xx or no connection) are
    # removed from rotation until a probe succeeds. Addresses start healthy
    # so traffic flows immediately without waiting for the first probe.
    # Omit this block to disable (no background goroutine, zero overhead).
    health_check:
      interval: "10s"
      path: "/health"
      timeout: "1s"

    # Retry budget. On a gateway error, tachyon retries GET/HEAD requests
    # once, consuming a token. Tokens replenish at retry_percent of
    # successful requests so retries can't amplify a partial outage into a
    # storm. min_tokens ensures retries work even after an idle period.
    # Omit this block to disable retries entirely.
    retry_budget:
      retry_percent: 20  # 1 token per 5 successes
      min_tokens: 3

# ---------------------------------------------------------------------------
# Routes — match on host + longest path prefix. Order doesn't matter.
# ---------------------------------------------------------------------------

routes:
  # Route all traffic for api.example.com to the "api" upstream.
  - host: "api.example.com"
    path: "/"
    upstream: "api"

  # Canary split: 95 % stable, 5 % canary.
  # Use "upstreams" (plural) instead of "upstream" for weighted routing.
  # - host: "api.example.com"
  #   path: "/"
  #   upstreams:
  #     - { name: "api",    weight: 95 }
  #     - { name: "canary", weight: 5  }

  # Catch-all: wildcard host, root path.
  - host: "*"
    path: "/"
    upstream: "backend"
