# nginx H3/QUIC bench config.
# TCP :8443 (TLS h2/h1) + UDP :8443 (QUIC h3), same cert as nginx-tls.
# Uses stock nginx 1.24 from Ubuntu 24.04, which ships QUIC support
# compiled in. No external module needed.

pid                 /tmp/nginx-h3.pid;
worker_processes    auto;
worker_rlimit_nofile 200000;

events {
    worker_connections 65535;
    use epoll;
    multi_accept       on;
    accept_mutex       off;
}

http {
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    server_tokens   off;

    keepalive_timeout  75s;
    keepalive_requests 100000;

    gzip off;
    access_log off;
    error_log  /tmp/nginx-h3-bench/error.log crit;

    upstream origin {
        server 127.0.0.1:9000;
        keepalive          512;
        keepalive_requests 100000;
        keepalive_timeout  300s;
    }

    server {
        # TCP: TLS + h2 for completeness.
        listen 8443 ssl reuseport backlog=65535 default_server;
        http2 on;

        # UDP: QUIC + h3. `reuseport` gives nginx's workers SO_REUSEPORT,
        # mirroring tachyon's fork-per-core layout.
        listen 8443 quic reuseport default_server;

        server_name _;

        ssl_certificate     /tmp/bench-tls.crt;
        ssl_certificate_key /tmp/bench-tls.key;
        ssl_protocols       TLSv1.3;
        ssl_session_cache   shared:SSL:64m;
        ssl_session_timeout 1h;

        # Advertise h3 so ALPN-aware clients try QUIC.
        add_header Alt-Svc 'h3=":8443"; ma=86400' always;

        location / {
            proxy_pass         http://origin;
            proxy_http_version 1.1;
            proxy_set_header Connection       "";
            proxy_set_header Host             $host;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP        $remote_addr;
        }
    }
}
