# nginx reverse-proxy config tuned for production-realistic benchmarking.
# Matches what a seasoned SRE would deploy: buffering on, generous fd limits,
# large upstream keepalive pool, SO_REUSEPORT listener with big backlog,
# tcp_nopush + tcp_nodelay + sendfile.
#
# Logging is disabled because the comparison proxies don't log either.
# Everything else is kept at production-normal values.

worker_processes    auto;        # one per logical CPU
worker_rlimit_nofile 200000;     # keep out of soft-limit hell

events {
    worker_connections 65535;
    use epoll;
    multi_accept       on;
    accept_mutex       off;       # unneeded with reuseport, adds latency
}

http {
    # --- basic tuning that every nginx deployment uses ---
    sendfile        on;
    tcp_nopush      on;           # coalesce header + body writes
    tcp_nodelay     on;           # flush last segment immediately
    server_tokens   off;

    keepalive_timeout  75s;
    keepalive_requests 100000;    # clients may reuse a conn ~forever

    # Gzip off — the tachyon and Pingora configs don't compress either,
    # and the origin payloads are already tiny fixed-size bodies.
    gzip off;

    # Logs off (apples-to-apples with tachyon/Pingora).
    access_log off;
    error_log  /tmp/nginx-bench/error.log crit;

    # --- upstream pool ---
    upstream origin {
        server 127.0.0.1:9000;
        keepalive          512;      # idle conns per worker -> ~8192 total at 16 workers
        keepalive_requests 100000;   # reuse the same upstream conn ~forever
        keepalive_timeout  300s;
    }

    # --- virtual host ---
    server {
        listen 8080 reuseport backlog=65535 default_server;

        # Swallow every host (match tachyon's wildcard behaviour so the
        # two proxies process the same set of requests).
        server_name _;

        location / {
            proxy_pass         http://origin;
            proxy_http_version 1.1;

            # Required for upstream keepalive reuse.
            proxy_set_header Connection       "";
            # Forwarding headers (same set tachyon rewrites).
            proxy_set_header Host             $host;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP        $remote_addr;

            # proxy_buffering on — nginx default, production-normal.
            # proxy_buffers 8 16k — nginx default.
        }
    }
}
