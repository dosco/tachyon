# nginx TLS termination config for benchmarking.
# Mirrors nginx.conf tuning; adds TLS on :8443 with a self-signed cert.
# Same keepalive, same buffering — only the listener and SSL layer differ.

pid                 /tmp/nginx-tls.pid;
worker_processes    auto;
worker_rlimit_nofile 200000;

events {
    worker_connections 65535;
    use epoll;
    multi_accept       on;
    accept_mutex       off;
}

http {
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    server_tokens   off;

    keepalive_timeout  75s;
    keepalive_requests 100000;

    gzip off;
    access_log off;
    error_log  /tmp/nginx-tls-bench/error.log crit;

    upstream origin {
        server 127.0.0.1:9000;
        keepalive          512;
        keepalive_requests 100000;
        keepalive_timeout  300s;
    }

    server {
        listen 8443 ssl reuseport backlog=65535 default_server;
        server_name _;

        ssl_certificate     /tmp/bench-tls.crt;
        ssl_certificate_key /tmp/bench-tls.key;

        # TLS 1.3 only — matches tachyon's default and modern clients.
        ssl_protocols       TLSv1.3;
        ssl_session_cache   shared:SSL:64m;
        ssl_session_timeout 1h;

        location / {
            proxy_pass         http://origin;
            proxy_http_version 1.1;
            proxy_set_header Connection       "";
            proxy_set_header Host             $host;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP        $remote_addr;
        }
    }
}
