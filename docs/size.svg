<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" width="920" height="300"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <rect width="920" height="300" fill="#ffffff" rx="10"/>

  <text x="30" y="34" font-size="14" fill="#212529" font-weight="700" letter-spacing="0.2">
    Codebase size  ·  lines of code
  </text>
  <text x="30" y="52" font-size="10.5" fill="#868e96">
    smaller is easier to audit, port, and debug at 3 AM
  </text>

  <!-- Three tower-style stacks, proportional heights.
       Scale: 170k → 180 px; 80k → 85 px; 20k → 21 px (too small) — use sqrt scale for visual balance
       Use linear with 170k → 180 px, show tachyon at ~22 px but with callout -->

  <!-- nginx tower: 170k LoC, width 160, height 180 -->
  <g transform="translate(110, 50)">
    <rect x="0" y="18" width="160" height="180" fill="#e9ecef" stroke="#ced4da" stroke-width="1.5" rx="4"/>
    <text x="80" y="10" text-anchor="middle" font-size="13" fill="#495057" font-weight="600">nginx</text>
    <text x="80" y="108" text-anchor="middle" font-size="26" fill="#495057" font-weight="700">~170k</text>
    <text x="80" y="128" text-anchor="middle" font-size="11" fill="#868e96">lines of C</text>
    <text x="80" y="215" text-anchor="middle" font-size="10" fill="#adb5bd">18 years of evolution</text>
  </g>

  <!-- Pingora tower: 80k LoC, width 160, height 85 -->
  <g transform="translate(380, 145)">
    <rect x="0" y="0" width="160" height="85" fill="#e9ecef" stroke="#ced4da" stroke-width="1.5" rx="4"/>
    <text x="80" y="-5" text-anchor="middle" font-size="13" fill="#495057" font-weight="600">Pingora</text>
    <text x="80" y="38" text-anchor="middle" font-size="22" fill="#495057" font-weight="700">~80k</text>
    <text x="80" y="55" text-anchor="middle" font-size="11" fill="#868e96">lines of Rust</text>
    <text x="80" y="72" text-anchor="middle" font-size="10" fill="#adb5bd">Cloudflare</text>
  </g>

  <!-- tachyon tower: 20k LoC, width 160, height 22 -->
  <g transform="translate(650, 208)">
    <rect x="0" y="0" width="160" height="22" fill="#9775fa" stroke="#5f3dc4" stroke-width="1.5" rx="4"/>
    <text x="80" y="-6" text-anchor="middle" font-size="13" fill="#5f3dc4" font-weight="700">tachyon</text>
    <text x="80" y="16" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="700">~20k Go</text>
  </g>

  <!-- Callout arrow + label for tachyon -->
  <line x1="730" y1="256" x2="730" y2="198" stroke="#e67700" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="730,194 726,202 734,202" fill="#e67700"/>
  <rect x="595" y="258" width="270" height="28" rx="14" fill="#fff9db" stroke="#fcc419" stroke-width="1.5"/>
  <text x="730" y="277" text-anchor="middle" font-size="12" fill="#e67700" font-weight="700">
    one engineer reads the whole thing in an afternoon
  </text>

  <!-- Horizontal baseline -->
  <line x1="30" y1="230" x2="890" y2="230" stroke="#dee2e6" stroke-width="1"/>
</svg>
