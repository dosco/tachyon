<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 280" width="920" height="280"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <rect width="920" height="280" fill="#ffffff" rx="10"/>

  <text x="30" y="34" font-size="14" fill="#212529" font-weight="700" letter-spacing="0.2">
    Tail latency  ·  burst load, 512 conns, plaintext GET
  </text>
  <text x="30" y="52" font-size="10.5" fill="#868e96">
    max request latency, milliseconds  ·  lower is better  ·  tail behavior under stress
  </text>

  <line x1="150" y1="90" x2="150" y2="220" stroke="#dee2e6" stroke-width="1"/>
  <line x1="274" y1="90" x2="274" y2="220" stroke="#f1f3f5" stroke-width="1"/>
  <line x1="398" y1="90" x2="398" y2="220" stroke="#f1f3f5" stroke-width="1"/>
  <line x1="522" y1="90" x2="522" y2="220" stroke="#f1f3f5" stroke-width="1"/>
  <line x1="646" y1="90" x2="646" y2="220" stroke="#f1f3f5" stroke-width="1"/>
  <line x1="770" y1="90" x2="770" y2="220" stroke="#dee2e6" stroke-width="1"/>

  <text x="274" y="237" text-anchor="middle" font-size="9.5" fill="#adb5bd">4 ms</text>
  <text x="398" y="237" text-anchor="middle" font-size="9.5" fill="#adb5bd">8 ms</text>
  <text x="522" y="237" text-anchor="middle" font-size="9.5" fill="#adb5bd">12 ms</text>
  <text x="646" y="237" text-anchor="middle" font-size="9.5" fill="#adb5bd">16 ms</text>
  <text x="770" y="237" text-anchor="middle" font-size="9.5" fill="#adb5bd">20 ms</text>

  <!-- Axis break zone -->
  <rect x="780" y="85" width="22" height="140" fill="#ffffff"/>
  <line x1="782" y1="85" x2="776" y2="225" stroke="#dee2e6" stroke-width="1.2"/>
  <line x1="798" y1="85" x2="792" y2="225" stroke="#dee2e6" stroke-width="1.2"/>

  <!-- Scale 0..20ms over x=150..x=770 (620px / 20ms = 31 px per ms) -->

  <!-- nginx: 8.26 ms → 150 + 256 = 406 -->
  <text x="140" y="112" text-anchor="end" font-size="12" fill="#495057" font-weight="500">nginx</text>
  <rect x="150" y="98" width="256" height="22" rx="3" fill="#ced4da"/>
  <text x="415" y="114" font-size="11" fill="#495057">8.26 ms</text>

  <!-- tachyon: 12.42 ms → 150 + 385 = 535 -->
  <text x="140" y="152" text-anchor="end" font-size="12" fill="#5f3dc4" font-weight="700">tachyon</text>
  <rect x="150" y="138" width="385" height="26" rx="3" fill="#9775fa"/>
  <text x="544" y="156" font-size="12" fill="#5f3dc4" font-weight="700">12.42 ms</text>

  <!-- Pingora: 4,010 ms — off-chart red bar with jagged break -->
  <text x="140" y="192" text-anchor="end" font-size="12" fill="#c92a2a" font-weight="600">Pingora</text>
  <rect x="150" y="178" width="625" height="22" rx="3" fill="#ffa8a8"/>
  <polygon points="775,178 788,182 775,186 788,190 775,194 788,198 775,200" fill="#ffa8a8" stroke="none"/>

  <rect x="810" y="172" width="92" height="34" rx="6" fill="#fff5f5" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="856" y="188" text-anchor="middle" font-size="12" fill="#c92a2a" font-weight="700">💀 4,010 ms</text>
  <text x="856" y="201" text-anchor="middle" font-size="9" fill="#e03131">off chart</text>

  <text x="30" y="264" font-size="10" fill="#868e96">
    Under the same burst, Pingora's worst request took 4 seconds. nginx and tachyon both absorbed the burst under 15 ms.
  </text>
</svg>
