# tachyon bench config — production-tuned to match nginx's upstream pool size.
listen: ":8080"

# One route per host/path-prefix. Longest prefix wins.
routes:
  - host: "example.com"
    path: "/"
    upstream: "pool-a"
  - host: "*"
    path: "/"
    upstream: "pool-a"

# Upstream pools. tachyon keeps `idle_per_host` warm connections per upstream
# per worker process. 512 matches nginx's `keepalive 512;` per-worker.
upstreams:
  pool-a:
    addrs: ["127.0.0.1:9000"]
    idle_per_host: 512
    connect_timeout: "1s"
